name: Application CI
on:
  workflow_dispatch: 
  push:
    branches:
      - main
      - develop
    paths:                        # ← Layer 1: sirf tab trigger ho jab in files mein change ho
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches:
      - develop
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'

env:
  NEXUS_URL: http://20.235.80.53:8081
  NEXUS_REPO: react-artifacts

jobs:
  # ─── Layer 2: Git diff se check karo actual changes hain ya nahi ───
  check-changes:
    name: Check for changes
    runs-on: self-hosted
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2            # last 2 commits chahiye diff ke liye

      - name: Check git diff
        id: diff
        run: |
          # [skip ci] commit se trigger hua? → skip karo
          LAST_MSG=$(git log -1 --pretty=%B)
          if echo "$LAST_MSG" | grep -q "\[skip ci\]"; then
            echo "⏭️ [skip ci] commit detected — skipping build"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Actual app files mein koi change hai?
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- \
            'src/' 'public/' 'package.json' 'package-lock.json' 2>/dev/null || \
            git diff --name-only HEAD -- \
            'src/' 'public/' 'package.json' 'package-lock.json')

          if [ -z "$CHANGED" ]; then
            echo "⏭️ No relevant changes found — skipping build"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Changes detected:"
            echo "$CHANGED"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  # ─── Build + Push (sirf tab jab changes hon) ────────────────────────
  build:
    name: Build Application
    runs-on: self-hosted
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 16.x

      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build application
        run: npm run build

      # ─── Auto Version Bump ────────────────────────────────────────
      - name: Bump version
        id: app_info
        run: |
          APP_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          echo "🔢 Version: $CURRENT_VERSION → $NEW_VERSION"

          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" package.json
          else
            sed -i "s/\"version\": \"$CURRENT_VERSION\"/\"version\": \"$NEW_VERSION\"/" package.json
          fi

          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "old_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "app_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "ci: bump version to ${{ steps.app_info.outputs.app_version }} [skip ci]"
          git push

      # ─── Package & Push to Nexus ──────────────────────────────────
      - name: Package build
        id: package
        run: |
          FILENAME="${{ steps.app_info.outputs.app_name }}-${{ steps.app_info.outputs.app_version }}.tar.gz"
          tar -czf "$FILENAME" build/
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "✅ Packaged: $FILENAME"

      - name: Push to Nexus
        if: github.event_name != 'pull_request'
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          FILENAME=${{ steps.package.outputs.filename }}
          APP_NAME=${{ steps.app_info.outputs.app_name }}
          VERSION=${{ steps.app_info.outputs.app_version }}

          NEXUS_PATH="${{ env.NEXUS_URL }}/repository/${{ env.NEXUS_REPO }}/${APP_NAME}/${VERSION}/${FILENAME}"

          echo "🚀 Pushing to: $NEXUS_PATH"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "$NEXUS_USER:$NEXUS_PASS" \
            --upload-file "$FILENAME" \
            "$NEXUS_PATH")

          echo "HTTP Status: $HTTP_STATUS"

          if [[ "$HTTP_STATUS" == "200" || "$HTTP_STATUS" == "201" ]]; then
            echo "✅ Successfully pushed to Nexus!"
          else
            echo "❌ Push failed with HTTP $HTTP_STATUS"
            exit 1
          fi

      # ─── Summary ──────────────────────────────────────────────────
      - name: Job Summary
        run: |
          echo "## 🎉 React App Pushed to Nexus!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | \`${{ steps.app_info.outputs.app_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Old Version | \`${{ steps.app_info.outputs.old_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New Version | \`${{ steps.app_info.outputs.app_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| File | \`${{ steps.package.outputs.filename }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Nexus URL | ${{ env.NEXUS_URL }}/repository/${{ env.NEXUS_REPO }}/ |" >> $GITHUB_STEP_SUMMARY
